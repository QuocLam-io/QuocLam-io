<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" fill="none">
  <defs>
    <style>
      @keyframes blink {
        0%, 49% { opacity: 0.8; }
        50%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 1s step-end infinite; }
      .ln  { fill: #484f58; font-family: 'Courier New', monospace; font-size: 13px; }
      .kw  { fill: #ff7b72; }
      .vr  { fill: #ffa657; }
      .st  { fill: #a5d6ff; }
      .cm  { fill: #8b949e; }
      .pr  { fill: #79c0ff; }
      .pn  { fill: #c9d1d9; }
      .tp  { fill: #ffa657; }
    </style>
  </defs>

  <!-- Window background -->
  <rect width="850" height="300" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="850" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="850" height="10" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="24" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="19" r="6" fill="#febc2e"/>
  <circle cx="64" cy="19" r="6" fill="#28c840"/>

  <!-- Tab bar -->
  <rect y="38" width="850" height="28" fill="#161b22"/>
  <!-- Active tab -->
  <rect x="0" y="38" width="120" height="28" fill="#0d1117"/>
  <!-- Teal active indicator -->
  <rect x="0" y="38" width="120" height="2" fill="#14b8a6"/>
  <!-- Tab label -->
  <text x="16" y="57" font-family="'Courier New', monospace" font-size="11">
    <tspan fill="#3178C6">TS</tspan><tspan fill="#8b949e">  </tspan><tspan fill="#c9d1d9">skills.ts</tspan>
  </text>

  <!-- Line numbers (right-aligned) -->
  <text class="ln" x="38" y="86" text-anchor="end">1</text>
  <text class="ln" x="38" y="108" text-anchor="end">2</text>
  <text class="ln" x="38" y="130" text-anchor="end">3</text>
  <text class="ln" x="38" y="152" text-anchor="end">4</text>
  <text class="ln" x="38" y="174" text-anchor="end">5</text>
  <text class="ln" x="38" y="196" text-anchor="end">6</text>
  <text class="ln" x="38" y="218" text-anchor="end">7</text>
  <text class="ln" x="38" y="240" text-anchor="end">8</text>
  <text class="ln" x="38" y="262" text-anchor="end">9</text>

  <!-- Gutter separator -->
  <line x1="46" y1="66" x2="46" y2="300" stroke="#1e2530" stroke-width="1"/>

  <!-- Line 1: comment -->
  <text x="56" y="86" font-family="'Courier New', monospace" font-size="13">
    <tspan class="cm">// what I work with</tspan>
  </text>

  <!-- Line 2: blank -->

  <!-- Line 3: const stack = { -->
  <text x="56" y="130" font-family="'Courier New', monospace" font-size="13">
    <tspan class="kw">const </tspan><tspan class="vr">stack</tspan><tspan class="pn"> = {</tspan>
  </text>

  <!-- Line 4: languages -->
  <text x="56" y="152" font-family="'Courier New', monospace" font-size="13">
    <tspan class="pn">  </tspan><tspan class="pr">languages</tspan><tspan class="pn">:  [</tspan><tspan class="st">"TypeScript"</tspan><tspan class="pn">, </tspan><tspan class="st">"JavaScript"</tspan><tspan class="pn">, </tspan><tspan class="st">"Python"</tspan><tspan class="pn">],</tspan>
  </text>

  <!-- Line 5: frontend -->
  <text x="56" y="174" font-family="'Courier New', monospace" font-size="13">
    <tspan class="pn">  </tspan><tspan class="pr">frontend</tspan><tspan class="pn">:   [</tspan><tspan class="st">"React"</tspan><tspan class="pn">, </tspan><tspan class="st">"Redux"</tspan><tspan class="pn">, </tspan><tspan class="st">"Sass"</tspan><tspan class="pn">, </tspan><tspan class="st">"Framer Motion"</tspan><tspan class="pn">],</tspan>
  </text>

  <!-- Line 6: backend -->
  <text x="56" y="196" font-family="'Courier New', monospace" font-size="13">
    <tspan class="pn">  </tspan><tspan class="pr">backend</tspan><tspan class="pn">:    [</tspan><tspan class="st">"Node.js"</tspan><tspan class="pn">, </tspan><tspan class="st">"Express"</tspan><tspan class="pn">],</tspan>
  </text>

  <!-- Line 7: databases -->
  <text x="56" y="218" font-family="'Courier New', monospace" font-size="13">
    <tspan class="pn">  </tspan><tspan class="pr">databases</tspan><tspan class="pn">:  [</tspan><tspan class="st">"MongoDB"</tspan><tspan class="pn">, </tspan><tspan class="st">"PostgreSQL"</tspan><tspan class="pn">],</tspan>
  </text>

  <!-- Line 8: passion -->
  <text x="56" y="240" font-family="'Courier New', monospace" font-size="13">
    <tspan class="pn">  </tspan><tspan class="pr">passion</tspan><tspan class="pn">:    </tspan><tspan class="st">"pixel-perfect UI"</tspan>
  </text>

  <!-- Line 9: } as const; -->
  <text x="56" y="262" font-family="'Courier New', monospace" font-size="13">
    <tspan class="pn">} </tspan><tspan class="kw">as </tspan><tspan class="tp">const</tspan><tspan class="pn">;</tspan>
  </text>

  <!-- Blinking cursor on empty line 10 -->
  <rect class="cursor" x="56" y="272" width="8" height="15" fill="#c9d1d9"/>
</svg>
