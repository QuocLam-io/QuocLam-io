<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" fill="none">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0); opacity: 0; }
        10% { opacity: 0.5; }
        90% { opacity: 0.5; }
        100% { transform: translateY(-80px); opacity: 0; }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(20,184,166,0.3)); }
        50% { filter: drop-shadow(0 0 20px rgba(20,184,166,0.6)); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.5; }
      }
      .code { font-family: 'Courier New', monospace; fill: #14b8a6; }
      .f1 { animation: float 7s ease-in-out infinite; }
      .f2 { animation: float 9s ease-in-out 2s infinite; }
      .f3 { animation: float 6s ease-in-out 1s infinite; }
      .f4 { animation: float 8s ease-in-out 3s infinite; }
      .f5 { animation: float 10s ease-in-out 4s infinite; }
      .f6 { animation: float 7.5s ease-in-out 5s infinite; }
      .f7 { animation: float 8.5s ease-in-out 0.5s infinite; }
      .name { animation: glow 4s ease-in-out infinite; }
      .dot1 { animation: pulse 3s ease-in-out infinite; }
      .dot2 { animation: pulse 3s ease-in-out 1.5s infinite; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="850" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#070b11"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="#14b8a6" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background layers -->
  <rect width="850" height="300" fill="url(#bg)" rx="8"/>
  <rect width="850" height="300" fill="url(#grid)" rx="8"/>
  <rect width="850" height="300" fill="url(#center-glow)" rx="8"/>

  <!-- Corner brackets -->
  <g stroke="#14b8a6" stroke-width="1.5" opacity="0.4">
    <path d="M16,16 L16,48"/><path d="M16,16 L48,16"/>
    <path d="M834,16 L834,48"/><path d="M834,16 L802,16"/>
    <path d="M16,284 L16,252"/><path d="M16,284 L48,284"/>
    <path d="M834,284 L834,252"/><path d="M834,284 L802,284"/>
  </g>

  <!-- Constellation left -->
  <g opacity="0.15">
    <circle cx="100" cy="70" r="1.5" fill="#14b8a6"/>
    <circle cx="145" cy="50" r="1" fill="#14b8a6"/>
    <circle cx="170" cy="85" r="1.5" fill="#14b8a6"/>
    <circle cx="125" cy="105" r="1" fill="#14b8a6"/>
    <line x1="100" y1="70" x2="145" y2="50" stroke="#14b8a6" stroke-width="0.5"/>
    <line x1="145" y1="50" x2="170" y2="85" stroke="#14b8a6" stroke-width="0.5"/>
    <line x1="170" y1="85" x2="125" y2="105" stroke="#14b8a6" stroke-width="0.5"/>
    <line x1="125" y1="105" x2="100" y2="70" stroke="#14b8a6" stroke-width="0.5"/>
  </g>

  <!-- Constellation right -->
  <g opacity="0.12">
    <circle cx="710" cy="60" r="1" fill="#14b8a6"/>
    <circle cx="745" cy="45" r="1.5" fill="#14b8a6"/>
    <circle cx="770" cy="75" r="1" fill="#14b8a6"/>
    <circle cx="725" cy="95" r="1.5" fill="#14b8a6"/>
    <line x1="710" y1="60" x2="745" y2="45" stroke="#14b8a6" stroke-width="0.5"/>
    <line x1="745" y1="45" x2="770" y2="75" stroke="#14b8a6" stroke-width="0.5"/>
    <line x1="770" y1="75" x2="725" y2="95" stroke="#14b8a6" stroke-width="0.5"/>
  </g>

  <!-- Floating code symbols -->
  <text class="code f1" x="70" y="250" font-size="14" opacity="0">&lt;/&gt;</text>
  <text class="code f2" x="190" y="265" font-size="11" opacity="0">{ }</text>
  <text class="code f3" x="340" y="255" font-size="13" opacity="0">=&gt;</text>
  <text class="code f4" x="480" y="270" font-size="12" opacity="0">[ ]</text>
  <text class="code f5" x="620" y="250" font-size="14" opacity="0">?.</text>
  <text class="code f6" x="740" y="260" font-size="11" opacity="0">...</text>
  <text class="code f7" x="280" y="260" font-size="10" opacity="0">&amp;&amp;</text>

  <!-- Decorative line -->
  <line x1="260" y1="150" x2="590" y2="150" stroke="#14b8a6" stroke-width="0.5" opacity="0.2"/>
  <circle class="dot1" cx="260" cy="150" r="2.5" fill="#14b8a6"/>
  <circle class="dot2" cx="590" cy="150" r="2.5" fill="#14b8a6"/>

  <!-- Name -->
  <text class="name" x="425" y="128" text-anchor="middle" fill="#ffffff" font-family="'Courier New', monospace" font-size="48" font-weight="bold" letter-spacing="10">QUOC LAM</text>

  <!-- Subtitle -->
  <text x="425" y="178" text-anchor="middle" fill="#8b949e" font-family="'Courier New', monospace" font-size="14" letter-spacing="5">FRONTEND ENGINEER</text>

  <!-- NYC badge -->
  <rect x="387" y="194" width="76" height="22" rx="11" fill="none" stroke="#14b8a6" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="425" y="209" text-anchor="middle" fill="#14b8a6" font-family="'Courier New', monospace" font-size="10" letter-spacing="3">NYC</text>
</svg>
